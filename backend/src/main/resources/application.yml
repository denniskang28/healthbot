server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:./data/healthbotdb;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

llm:
  service:
    url: http://localhost:8000

logging:
  level:
    com.healthbot: INFO
